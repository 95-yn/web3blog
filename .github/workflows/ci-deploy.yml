name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Lint
        run: pnpm lint
      
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: web3blog:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: Production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Install Docker and git if not exists
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi
            if ! command -v git &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y git
            fi
            
            # Create project directory and clone code (only first time)
            mkdir -p ~/web3blog
            cd ~/web3blog
            
            if [ ! -d .git ]; then
              rm -rf *
              git clone --depth 1 https://github.com/95-yn/web3blog.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Enable swap if low memory (helps with pnpm install)
            if [ -f /proc/meminfo ]; then
              total_mem=$(free -m | awk '/^Mem:/{print $2}')
              if [ "$total_mem" -lt 2048 ]; then
                sudo fallocate -l 2G /swapfile || true
                sudo chmod 600 /swapfile || true
                sudo mkswap /swapfile || true
                sudo swapon /swapfile || true
              fi
            fi
            
            # Build with retry and memory optimization
            MAX_RETRIES=3
            for i in $(seq 1 $MAX_RETRIES); do
              echo "Build attempt $i of $MAX_RETRIES"
              docker build --network=host --build-arg NODE_OPTIONS="--max-old-space-size=1024" -t web3blog:latest . && break
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Build failed, retrying in 5 seconds..."
                sleep 5
              fi
            done
            
            docker stop web3blog 2>/dev/null || true
            docker rm web3blog 2>/dev/null || true
            docker stop web3blog 2>/dev/null || true
            docker rm web3blog 2>/dev/null || true
            docker run -d \
              --name web3blog \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              -e NEXT_PUBLIC_BASE_PATH="" \
              -e __NEXT_ASSET_PREFIX="" \
              web3blog:latest
